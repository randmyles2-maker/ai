<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core Intelligence Node</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div id="ai-shell">
        <header>
            <div class="brand">
                <span class="pulse-icon"></span>
                <h1>AURA <small>v3.0 Live</small></h1>
            </div>
            <div id="system-status">Sourcing: Web, Wiki, Satellite</div>
        </header>

        <main id="chat-flow">
            <div class="bubble ai-msg">Neural Link Established. System is operating at peak capacity. How can I assist you?</div>
        </main>

        <footer class="input-container">
            <input type="text" id="user-query" placeholder="Enter query..." autocomplete="off">
            <button id="send-btn">
                <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
            </button>
        </footer>
    </div>
    <script src="index.js"></script>
</body>
</html>
