<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Intelligence Node</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #ffffff; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { padding: 15px; border-bottom: 1px solid #d1d1d6; text-align: center; background: #f8f8f8; font-weight: 600; font-size: 17px; }
        #chat-flow { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 20px; font-size: 15px; line-height: 1.4; background: #e9e9eb; color: #000; align-self: flex-start; border-bottom-left-radius: 4px; }
        .label { font-size: 10px; font-weight: bold; color: #8e8e93; text-transform: uppercase; margin-bottom: 4px; }
    </style>
</head>
<body>
    <div class="header">Intelligence Node</div>
    <div id="chat-flow">
        <div class="msg">System connecting... Checking for data sync.</div>
    </div>
    <script>
        async function update() {
            try {
                const res = await fetch('data.json?t=' + Date.now());
                const data = await res.json();
                if (data.updates && data.updates.length > 0) {
                    document.getElementById('chat-flow').innerHTML = data.updates.map(i => `
                        <div class="msg">
                            <div class="label">${i.domain} • ${i.time}</div>
                            ${i.content}
                        </div>
                    `).join('');
                }
            } catch (e) { console.log("Still waiting for data.json..."); }
        }
        setInterval(update, 5000);
        update();
    </script>
</body>
</html>
