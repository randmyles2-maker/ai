<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: -apple-system, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; background: #fff; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .bubble { max-width: 75%; padding: 10px 15px; border-radius: 20px; font-size: 16px; line-height: 1.4; }
        .ai { background: #e9e9eb; color: #000; align-self: flex-start; border-bottom-left-radius: 4px; }
        .user { background: #007aff; color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
        .bar { padding: 10px; border-top: 1px solid #ddd; display: flex; gap: 10px; background: #fff; padding-bottom: 25px; }
        input { flex: 1; padding: 10px 15px; border-radius: 20px; border: 1px solid #ddd; outline: none; font-size: 16px; }
        button { background: #007aff; color: #fff; border: none; padding: 0 20px; border-radius: 20px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div id="chat"></div>
    <div class="bar">
        <input type="text" id="in" placeholder="iMessage">
        <button onclick="send()">Send</button>
    </div>
    <script>
        // Load messages from memory so they stay on screen
        let history = JSON.parse(localStorage.getItem('ai_chat') || '[]');
        
        async function load() {
            try {
                const r = await fetch('data.json?v=' + Date.now());
                const d = await r.json();
                const chat = document.getElementById('chat');
                
                // Show both server responses and your local history
                const all = [...d.updates, ...history].sort((a, b) => a.t - b.t);
                chat.innerHTML = all.map(m => `<div class="bubble ${m.role}">${m.text}</div>`).join('');
                chat.scrollTop = chat.scrollHeight;
            } catch(e) {}
        }

        function send() {
            const i = document.getElementById('in');
            if(!i.value) return;
            
            // Add your message locally
            const userMsg = { role: 'user', text: i.value, t: Date.now() };
            history.push(userMsg);
            localStorage.setItem('ai_chat', JSON.stringify(history));
            
            i.value = '';
            load();
            
            // Helpful hint for the user
            console.log("To get a reply, click 'Run Workflow' in GitHub Actions!");
        }
        setInterval(load, 5000);
        load();
    </script>
</body>
</html>
