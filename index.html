<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>TRO Network</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="bg-animate"></div>
    <div id="app-wrapper">
        <header class="top-nav">
            <div class="brand">TRO <span>NETWORK</span></div>
            <div class="status">UPLINK_STABLE</div>
        </header>

        <div id="chat-flow"></div>
            
        <div class="input-area">
            <div class="input-bar">
                <label for="photo-input" class="action-btn">＋</label>
                <input type="file" id="photo-input" accept="image/*" style="display:none">
                
                <input type="text" id="user-query" placeholder="Enter Command..." autocomplete="off">
                
                <button id="send-btn" class="action-btn">➔</button>
            </div>
        </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
