<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Node Live</title>
    <style>
        body { font-family: -apple-system, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; background: #fff; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .bubble { max-width: 80%; padding: 12px 16px; border-radius: 20px; font-size: 16px; line-height: 1.4; }
        .ai { background: #e9e9eb; color: #000; align-self: flex-start; border-bottom-left-radius: 4px; }
        .user { background: #007aff; color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
        .bar { padding: 15px; border-top: 1px solid #ddd; display: flex; gap: 10px; padding-bottom: 30px; }
        input { flex: 1; padding: 12px; border-radius: 25px; border: 1px solid #ddd; outline: none; }
        button { background: #007aff; color: white; border: none; padding: 0 20px; border-radius: 25px; font-weight: bold; cursor: pointer; }
        .typing { font-size: 12px; color: #8e8e93; margin-left: 10px; display: none; }
    </style>
</head>
<body>
    <div id="chat">
        <div class="bubble ai">Intelligence Node Active. I can now answer math, science, and history in real-time.</div>
    </div>
    <div id="status" class="typing">AI is thinking...</div>
    <div class="bar">
        <input type="text" id="user-in" placeholder="Ask me anything...">
        <button onclick="askAI()">Send</button>
    </div>

    <script>
        async function askAI() {
            const input = document.getElementById('user-in');
            const chat = document.getElementById('chat');
            const status = document.getElementById('status');
            const text = input.value.trim();
            
            if (!text) return;

            // 1. Show User Message
            chat.innerHTML += `<div class="bubble user">${text}</div>`;
            input.value = "";
            status.style.display = "block";
            chat.scrollTop = chat.scrollHeight;

            // 2. Real-Time Brain (Using a Public Model)
            try {
                // We use a public inference endpoint that doesn't require a personal login
                const response = await fetch("https://api-inference.huggingface.co/models/facebook/blenderbot-400M-distill", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ inputs: text })
                });

                const data = await response.json();
                const reply = data.generated_text || data[0].generated_text || "I am currently processing that data point.";

                // 3. Show AI Response
                status.style.display = "none";
                chat.innerHTML += `<div class="bubble ai">${reply}</div>`;
                chat.scrollTop = chat.scrollHeight;
            } catch (err) {
                status.style.display = "none";
                chat.innerHTML += `<div class="bubble ai">Connection spike detected. Try again in a second.</div>`;
            }
        }
    </script>
</body>
</html>
