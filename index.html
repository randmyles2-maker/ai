<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRO Network | Terminal</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div id="tro-container">
        <aside id="sidebar">
            <div class="logo">TRO <span>NETWORK</span></div>
            <nav>
                <div class="nav-item active">Main Terminal</div>
                <div class="nav-item">Web Harvester</div>
                <div class="nav-item">Social Hub</div>
            </nav>
            
            <div class="sidebar-label">SAVED DATA</div>
            <div id="saved-list">
                </div>

            <div id="system-stats">
                <p>CPU: 14%</p>
                <p>Uplink: Secure</p>
            </div>
        </aside>

        <main id="main-terminal">
            <header>
                <div class="pulse"></div>
                <h2>SYSTEM STATUS: OPTIMAL</h2>
            </header>
            
            <div id="chat-flow">
                <div class="bubble ai-msg">TRO Network Initialized. Click any response to save it to your sidebar.</div>
            </div>

            <footer class="input-area">
                <input type="text" id="user-query" placeholder="Execute command..." autocomplete="off">
                <button id="send-btn">SEND</button>
            </footer>
        </main>
    </div>
    <script src="index.js"></script>
</body>
</html>
