<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Intelligence Node</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #ffffff; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        .header { padding: 15px; border-bottom: 1px solid #d1d1d6; text-align: center; background: #f8f8f8; font-weight: 600; }
        #chat-flow { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 20px; font-size: 15px; line-height: 1.4; align-self: flex-start; background: #e9e9eb; color: #000; border-bottom-left-radius: 4px; }
        .user { align-self: flex-end; background: #007aff; color: #fff; border-bottom-left-radius: 20px; border-bottom-right-radius: 4px; }
        .input-area { padding: 15px; border-top: 1px solid #d1d1d6; display: flex; gap: 10px; background: #fff; padding-bottom: 30px; }
        input { flex: 1; padding: 12px; border-radius: 25px; border: 1px solid #d1d1d6; outline: none; font-size: 16px; }
        button { background: #007aff; color: white; border: none; padding: 0 20px; border-radius: 25px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">AI Intelligence Node</div>
    <div id="chat-flow"></div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="Type a message...">
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>
        async function update() {
            try {
                const res = await fetch('data.json?t=' + Date.now());
                const data = await res.json();
                const flow = document.getElementById('chat-flow');
                flow.innerHTML = data.updates.map(i => `
                    <div class="msg ${i.domain === 'USER' ? 'user' : ''}">
                        ${i.content}
                    </div>
                `).join('');
                flow.scrollTop = flow.scrollHeight;
            } catch (e) { console.log("Syncing..."); }
        }

        function sendMessage() {
            const input = document.getElementById('user-input');
            if (!input.value.trim()) return;
            
            // This displays your message immediately in Blue
            const flow = document.getElementById('chat-flow');
            flow.innerHTML += `<div class="msg user">${input.value}</div>`;
            input.value = '';
            flow.scrollTop = flow.scrollHeight;

            alert("Message logged! The AI Brain will process this in the next 10-minute sync cycle.");
        }

        setInterval(update, 5000);
        update();
    </script>
</body>
</html>
