<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intelligence Stream</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #ffffff; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        .header { padding: 15px; border-bottom: 1px solid #d1d1d6; text-align: center; background: #f7f7f7; font-weight: 600; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .bubble { max-width: 80%; padding: 12px; border-radius: 18px; font-size: 15px; background: #e9e9eb; align-self: flex-start; border-bottom-left-radius: 4px; }
        .label { font-size: 10px; font-weight: bold; color: #8e8e93; text-transform: uppercase; margin-bottom: 2px; }
    </style>
</head>
<body>
    <div class="header">Intelligence Node</div>
    <div id="chat"><div class="bubble">Waiting for AI Sync...</div></div>
    <script>
        async function load() {
            try {
                const r = await fetch('data.json?nocache=' + Date.now());
                const d = await r.json();
                if (d.updates && d.updates.length > 0) {
                    document.getElementById('chat').innerHTML = d.updates.map(i => `
                        <div class="bubble"><div class="label">${i.domain}</div>${i.content}</div>
                    `).join('');
                }
            } catch (e) { console.log("Syncing..."); }
        }
        setInterval(load, 5000);
        load();
    </script>
</body>
</html>
