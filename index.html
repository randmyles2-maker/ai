<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Intelligence Node</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>AI Node</h1>
            <p>Guided by Ethics & Logic</p>
        </header>
        
        <div id="chat-container">
            <div class="msg ai">System Online. I am programmed to be helpful, ethical, and knowledgeable. How can I assist you today?</div>
        </div>

        <div class="input-area">
            <input type="text" id="user-input" placeholder="Ask about math, science, or feelings..." onkeypress="if(event.key === 'Enter') sendMsg()">
            <button onclick="sendMsg()">Send</button>
        </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
