<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Intelligence Node</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #ffffff; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        .header { padding: 15px; border-bottom: 1px solid #d1d1d6; text-align: center; background: #f8f8f8; font-weight: 600; }
        #chat-flow { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 20px; font-size: 15px; line-height: 1.4; align-self: flex-start; background: #e9e9eb; color: #000; border-bottom-left-radius: 4px; }
        .user { align-self: flex-end; background: #007aff; color: #fff; border-bottom-left-radius: 20px; border-bottom-right-radius: 4px; }
        .input-area { padding: 10px; border-top: 1px solid #d1d1d6; display: flex; gap: 10px; background: #fff; }
        input { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid #d1d1d6; outline: none; }
        button { background: #007aff; color: white; border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">AI Intelligence Node</div>
    <div id="chat-flow"></div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="Ask the AI anything...">
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>
        async function update() {
            const res = await fetch('data.json?t=' + Date.now());
            const data = await res.json();
            const flow = document.getElementById('chat-flow');
            flow.innerHTML = data.updates.map(i => `
                <div class="msg ${i.domain === 'USER' ? 'user' : ''}">
                    ${i.content}
                </div>
            `).join('');
            flow.scrollTop = flow.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const message = input.value;
            if (!message) return;
            
            // Add user message to UI immediately
            document.getElementById('chat-flow').innerHTML += `<div class="msg user">${message}</div>`;
            input.value = '';

            // Note: In a full ChatGPT clone, we'd send this to a backend. 
            // For now, it triggers the GitHub AI to "respond" in the next sync.
            console.log("Sending to AI...");
        }

        setInterval(update, 5000);
        update();
    </script>
</body>
</html>
