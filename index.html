<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Node (Google Powered)</title>
    <style>
        body { font-family: -apple-system, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .bubble { max-width: 80%; padding: 12px; border-radius: 20px; font-size: 16px; }
        .ai { background: #e9e9eb; align-self: flex-start; }
        .user { background: #007aff; color: #fff; align-self: flex-end; }
        .bar { padding: 15px; border-top: 1px solid #ddd; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 20px; border: 1px solid #ddd; outline: none; }
        button { background: #007aff; color: white; border: none; padding: 0 20px; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="chat"></div>
    <div class="bar">
        <input type="text" id="in" placeholder="Ask math or facts...">
        <button onclick="ask()">Send</button>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbymgGbGjEXze2Lgo7FziNK_brUqGomK59G0J6yqKAbH0l-cJRQbXVOPvnkYiqzqefsqUQ/exec"; 

        async function ask() {
            const input = document.getElementById('in');
            const chat = document.getElementById('chat');
            const text = input.value;
            if(!text) return;

            chat.innerHTML += `<div class="bubble user">${text}</div>`;
            input.value = "";

            try {
                const response = await fetch(`${SCRIPT_URL}?q=${encodeURIComponent(text)}`);
                const answer = await response.text();
                chat.innerHTML += `<div class="bubble ai">${answer}</div>`;
            } catch (e) {
                chat.innerHTML += `<div class="bubble ai">Node Error: Check Deployment.</div>`;
            }
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
