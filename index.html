<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>TRO Network</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div id="app-wrapper">
        <aside id="sidebar">
            <div class="app-header">
                <div class="logo">TRO <span>NETWORK</span></div>
            </div>
            
            <nav class="menu">
                <div class="nav-btn active">TERMINAL</div>
                <div class="nav-btn">HARVESTER</div>
            </nav>

            <div class="storage-section">
                <span class="label">DATABASE</span>
                <div id="saved-list"></div>
            </div>

            <div class="sys-info">
                <div class="stat"><span>UPLINK</span> <span class="val">ACTIVE</span></div>
                <div class="stat"><span>LATENCY</span> <span class="val">14ms</span></div>
            </div>
        </aside>

        <main id="stage">
            <div id="chat-flow"></div>
            
            <div class="input-container">
                <div class="input-box">
                    <input type="text" id="user-query" placeholder="Command..." autofocus>
                    <button id="send-btn">➔</button>
                </div>
            </div>
        </main>
    </div>
    <script src="index.js"></script>
</body>
</html>
