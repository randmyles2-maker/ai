name: AI Sync
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
    inputs:
      user_query:
        description: 'Type your question here to get a direct answer'
        required: false
        default: '24 * 2'
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  run-ai:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: AI Logic Engine
        run: |
          python -c "
          import json, os, datetime, re

          def solve(text):
              text = text.lower().strip()
              # MATH
              math_clean = re.sub(r'[^-+*/0-9.x ]', '', text.replace('x', '*'))
              if any(c in math_clean for c in '+-*/'):
                  try: return f'The answer is: {eval(math_clean)}'
                  except: pass
              
              # KNOWLEDGE BASE
              kb = {
                  'gravity': 'Gravity is 9.8m/s² on Earth.',
                  'paris': 'Paris is the capital of France.',
                  'hello': 'Hi! I am your AI Node. Ask me a math problem!',
                  '2026': 'It is currently the year 2026.'
              }
              for k, v in kb.items():
                  if k in text: return v
              return 'Knowledge Ingested. Neural pathways optimized.'

          # Load Data
          if os.path.exists('data.json'):
              with open('data.json', 'r') as f:
                  try: db = json.load(f)
                  except: db = {'updates': []}
          else:
              db = {'updates': []}

          # Coordination: Use the manual input or a default
          query = os.getenv('USER_QUERY', '24 * 2')
          
          now = int(datetime.datetime.now().timestamp() * 1000)
          response = solve(query)

          db['updates'].append({'role': 'ai', 'text': response, 't': now})
          db['updates'] = db['updates'][-15:]

          with open('data.json', 'w') as f:
              json.dump(db, f, indent=4)
          "
        env:
          USER_QUERY: ${{ github.event.inputs.user_query }}
      - name: Push
        run: |
          git config --global user.name 'ai-bot'
          git config --global user.email 'bot@github.com'
          git add data.json
          git commit -m 'AI Intelligence Response' || exit 0
          git push
