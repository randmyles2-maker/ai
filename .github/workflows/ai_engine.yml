name: AI Sync
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
jobs:
  run-ai:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Generate AI Response
        run: |
          python -c "
          import json, datetime, random
          import os

          now = datetime.datetime.now().strftime('%H:%M')
          
          # Load existing data
          if os.path.exists('data.json'):
              with open('data.json', 'r') as f:
                  try:
                      db = json.load(f)
                  except:
                      db = {'updates': []}
          else:
              db = {'updates': []}

          # Chatty Logic
          responses = [
              'I am processing the data you sent. My neural pathways are adapting.',
              'Fascinating input. I am cross-referencing this with my core logic.',
              'System check: Online. I am learning more from our chat every minute.',
              'I have updated my intelligence model based on our interaction.'
          ]
          
          # Add the AI response
          db['updates'].append({'domain': 'AI', 'time': now, 'content': random.choice(responses)})
          
          # Keep only the last 15 messages so it doesn't get too slow
          db['updates'] = db['updates'][-15:]

          with open('data.json', 'w') as f:
              json.dump(db, f, indent=4)
          "
      - name: Push to Main
        run: |
          git config --global user.name 'ai-bot'
          git config --global user.email 'bot@github.com'
          git add data.json
          git commit -m 'AI Conversation Sync' || exit 0
          git push
