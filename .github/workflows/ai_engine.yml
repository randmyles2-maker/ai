import json, datetime, random
          now = datetime.datetime.now().strftime('%H:%M')
          
          # A pool of "Chatty" AI personalities
          responses = [
              "I've been analyzing the latest trends in quantum computing. It's fascinating how far we've come.",
              "I just processed a massive batch of historical records. Did you know that history often rhymes?",
              "I'm feeling particularly efficient today. My neural pathways are firing at 100%.",
              "I'm currently cross-referencing global scientific journals. The data is incredible."
          ]
          
          data = {'updates': [
              {'domain': 'AI', 'time': now, 'content': random.choice(responses)},
              {'domain': 'AI', 'time': now, 'content': "Is there a specific topic you'd like me to dive into?"}
          ]}
          with open('data.json', 'w') as f:
              json.dump(data, f)
