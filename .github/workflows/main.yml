name: 10-Minute Global Sync
on:
  schedule:
    - cron: '*/10 * * * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Environment
        run: pip install -r requirements.txt
      - name: Run Global Ingestion
        run: python main.py --mode sync-all
      - name: Auto-Commit Knowledge Update
        run: |
          git config user.name "AI-Sync-Bot"
          git add knowledge_base/
          git commit -m "Real-time sync: $(date)"
          git push
