<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Universal AI Dashboard</title>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0d1117; color: #c9d1d9; padding: 40px; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; margin-bottom: 20px; }
        .input-group { display: flex; gap: 10px; margin-top: 15px; }
        input { flex: 1; padding: 12px; background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 4px; }
        button { background: #238636; color: white; border: none; padding: 10px 25px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        #response { margin-top: 20px; padding: 15px; background: #000; border-radius: 4px; border-left: 4px solid #f1e05a; display: none; }
        .domain-label { color: #58a6ff; font-weight: bold; font-size: 0.8em; text-transform: uppercase; }
    </style>
</head>
<body>
    <h1>Universal Intelligence Node</h1>

    <div class="card">
        <div class="domain-label">Live Command Interface</div>
        <div class="input-group">
            <input type="text" id="ai-query" placeholder="Enter math, science, or history query...">
            <button onclick="executeAI()">Execute</button>
        </div>
        <div id="response"></div>
    </div>

    <h2>Real-Time Knowledge Feed (10m Sync)</h2>
    <div id="feed"></div>

    <script>
        async function executeAI() {
            const query = document.getElementById('ai-query').value;
            const resDiv = document.getElementById('response');
            
            // IMPORTANT: Replace with your NGROK URL
            const NGROK_URL = "https://YOUR_ADDRESS.ngrok-free.app";

            resDiv.style.display = "block";
            resDiv.innerHTML = "<em>Processing on local hardware...</em>";

            try {
                const response = await fetch(`${NGROK_URL}/ask?query=${encodeURIComponent(query)}`);
                const data = await response.json();
                resDiv.innerHTML = `<strong>AI:</strong> ${data.answer}`;
                // Tell MathJax to look for new math
                MathJax.typeset();
            } catch (e) {
                resDiv.innerHTML = "<span style='color:red'>Node Offline. Ensure launcher.py and ngrok are running.</span>";
            }
        }
    </script>
</body>
</html>
