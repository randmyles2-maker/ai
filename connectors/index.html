<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Intelligence Stream</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica; background: #ffffff; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        .header { padding: 15px; border-bottom: 1px solid #e5e5e5; text-align: center; font-weight: 600; font-size: 17px; background: #f7f7f7; }
        #chat-flow { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 80%; padding: 12px 18px; border-radius: 18px; font-size: 15px; line-height: 1.4; align-self: flex-start; background: #e9e9eb; color: #000000; border-bottom-left-radius: 4px; animation: fadeIn 0.3s ease; }
        .label { font-size: 10px; font-weight: bold; color: #8e8e93; margin-bottom: 4px; text-transform: uppercase; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="header">AI Intelligence Node</div>
    <div id="chat-flow">
        <div class="msg">Initializing System... updates every 10 minutes.</div>
    </div>

    <script>
        async function updateStream() {
            try {
                const res = await fetch('data.json?nocache=' + Date.now());
                const data = await res.json();
                const flow = document.getElementById('chat-flow');
                
                if (data.updates && data.updates.length > 0) {
                    flow.innerHTML = data.updates.map(item => `
                        <div class="msg">
                            <div class="label">${item.domain} • ${item.time}</div>
                            ${item.content}
                        </div>
                    `).join('');
                }
            } catch (e) { 
                console.log("Waiting for data.json to be populated..."); 
            }
        }
        // Refresh every 30 seconds
        setInterval(updateStream, 30000);
        updateStream();
    </script>
</body>
</html>
