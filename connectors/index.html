<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Intelligence Stream</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --ai-bubble: #e9e9eb;
            --text-main: #000000;
            --text-dim: #8e8e93;
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg-color); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        .header { padding: 20px; border-bottom: 1px solid #dbdbdb; text-align: center; background: #f9f9f9; }
        .header h1 { margin: 0; font-size: 17px; font-weight: 600; }
        .status { font-size: 11px; color: #34c759; text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }
        
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        
        .bubble { max-width: 80%; padding: 12px 16px; border-radius: 20px; font-size: 15px; line-height: 1.4; align-self: flex-start; background: var(--ai-bubble); color: var(--text-main); border-bottom-left-radius: 4px; position: relative; }
        .metadata { font-size: 10px; font-weight: bold; color: var(--text-dim); margin-bottom: 4px; text-transform: uppercase; }
        .timestamp { font-size: 10px; color: var(--text-dim); margin-top: 4px; text-align: right; }
    </style>
</head>
<body>

<div class="header">
    <h1>Universal Intelligence</h1>
    <div class="status">● Live Sync Active</div>
</div>

<div id="chat-container">
    </div>

<script>
    async function fetchUpdates() {
        try {
            const response = await fetch('data.json?t=' + Date.now());
            const data = await response.json();
            const container = document.getElementById('chat-container');
            
            container.innerHTML = data.updates.map(msg => `
                <div class="bubble">
                    <div class="metadata">${msg.domain}</div>
                    ${msg.content}
                    <div class="timestamp">${msg.time}</div>
                </div>
            `).join('');
            
            container.scrollTop = container.scrollHeight;
        } catch (e) {
            console.log("Syncing knowledge base...");
        }
    }

    // Auto-refresh every 30 seconds
    setInterval(fetchUpdates, 30000);
    fetchUpdates();
</script>
</body>
</html>
