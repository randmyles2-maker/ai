<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Messages</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --ai-bubble: #e9e9eb;
            --user-bubble: #007aff;
            --text-dark: #000000;
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg-color); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        /* Header */
        .header { padding: 20px; border-bottom: 1px solid #dbdbdb; text-align: center; font-weight: 600; font-size: 17px; }
        
        /* Chat Window */
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        
        /* Bubbles */
        .bubble { max-width: 70%; padding: 10px 15px; border-radius: 20px; font-size: 15px; line-height: 1.4; position: relative; }
        .ai { align-self: flex-start; background: var(--ai-bubble); color: var(--text-dark); border-bottom-left-radius: 5px; }
        .user { align-self: flex-end; background: var(--user-bubble); color: white; border-bottom-right-radius: 5px; }
        
        /* Input Area */
        .input-area { padding: 15px; border-top: 1px solid #dbdbdb; display: flex; gap: 10px; background: #f9f9f9; }
        input { flex: 1; padding: 10px 15px; border-radius: 20px; border: 1px solid #dbdbdb; outline: none; }
        button { background: var(--user-bubble); color: white; border: none; border-radius: 50%; width: 35px; height: 35px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">Universal Intelligence</div>

<div id="chat-window">
    <div class="bubble ai">System Online. Laptop Node connected.</div>
</div>

<div class="input-area">
    <input type="text" id="msg-input" placeholder="iMessage">
    <button onclick="sendMessage()">↑</button>
</div>

<script>
    const GITHUB_USER = "randmyles2-maker";
    const GITHUB_REPO = "ai";
    const TOKEN = "YOUR_TOKEN_HERE"; // PASTE YOUR KEY HERE

    async function sendMessage() {
        const input = document.getElementById('msg-input');
        const text = input.value;
        if(!text) return;

        // Show user bubble immediately
        addBubble(text, 'user');
        input.value = "";

        // Send to GitHub as request.txt
        await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/request.txt`, {
            method: "PUT",
            headers: { "Authorization": `token ${TOKEN}`, "Content-Type": "application/json" },
            body: JSON.stringify({
                message: "New Message",
                content: btoa(text),
                branch: "main"
            })
        });
    }

    function addBubble(text, type) {
        const win = document.getElementById('chat-window');
        const div = document.createElement('div');
        div.className = `bubble ${type}`;
        div.innerText = text;
        win.appendChild(div);
        win.scrollTop = win.scrollHeight;
    }

    async function pollForResponse() {
        const res = await fetch('data.json?t=' + Date.now());
        const data = await res.json();
        const lastEntry = data.updates[0];
        
        // If the last update is a new response, show it
        if (lastEntry && lastEntry.domain === "AI Response") {
            addBubble(lastEntry.content, 'ai');
        }
    }
    setInterval(pollForResponse, 10000); // Check every 10 seconds
</script>
</body>
</html>
