<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Messages</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #ffffff; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        .header { padding: 20px; border-bottom: 1px solid #dbdbdb; text-align: center; font-weight: 600; font-size: 17px; background: #f9f9f9; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .bubble { max-width: 75%; padding: 12px 16px; border-radius: 20px; font-size: 15px; line-height: 1.4; }
        .ai { align-self: flex-start; background: #e9e9eb; color: #000; border-bottom-left-radius: 4px; }
        .label { font-size: 10px; color: #8e8e93; text-transform: uppercase; margin-bottom: 4px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header">Intelligence Feed</div>
    <div id="chat"></div>

    <script>
        async function loadMessages() {
            try {
                const res = await fetch('data.json?t=' + Date.now());
                const data = await res.json();
                const chat = document.getElementById('chat');
                chat.innerHTML = data.updates.map(msg => `
                    <div class="bubble ai">
                        <div class="label">${msg.domain} • ${msg.time}</div>
                        ${msg.content}
                    </div>
                `).join('');
            } catch (e) { console.log("Syncing..."); }
        }
        setInterval(loadMessages, 10000);
        loadMessages();
    </script>
</body>
</html>
