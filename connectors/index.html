<div class="card">
    <div class="domain-label">Universal Command Line</div>
    <input type="text" id="user-query" placeholder="Enter query...">
    <button onclick="sendToGitHub()">Execute</button>
    <p id="status"></p>
</div>

<script>
async function sendToGitHub() {
    const query = document.getElementById('user-query').value;
    const token = "YOUR_GITHUB_TOKEN"; // You generate this in GitHub settings
    const repo = "randmyles2-maker/ai";
    
    document.getElementById('status').innerText = "Sending request to laptop...";

    // This creates/updates 'request.txt' in your repo
    const response = await fetch(`https://api.github.com/repos/${repo}/contents/request.txt`, {
        method: "PUT",
        headers: { "Authorization": `token ${token}`, "Content-Type": "application/json" },
        body: json.stringify({
            message: "User Query",
            content: btoa(query), // Encodes text to Base64
            branch: "main"
        })
    });

    if(response.ok) {
        document.getElementById('status').innerText = "Request sent! Laptop will process in next sync.";
    }
}
</script>
