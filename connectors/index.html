<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Intelligence Stream</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica; background: #ffffff; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        .header { padding: 15px; border-bottom: 1px solid #e5e5e5; text-align: center; font-weight: 600; font-size: 17px; background: #f7f7f7; }
        #chat-flow { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; background: #ffffff; }
        
        /* Message Bubbles */
        .msg { max-width: 75%; padding: 12px 16px; border-radius: 18px; font-size: 15px; line-height: 1.4; position: relative; animation: fadeIn 0.3s ease; }
        .ai-node { align-self: flex-start; background: #e9e9eb; color: #000000; border-bottom-left-radius: 4px; }
        .label { font-size: 10px; font-weight: bold; color: #8e8e93; margin-bottom: 4px; text-transform: uppercase; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="header">Universal AI Node</div>

<div id="chat-flow">
    <div class="msg ai-node">
        <div class="label">System</div>
        Waiting for Laptop Sync...
    </div>
</div>

<script>
    async function updateStream() {
        try {
            // Fetch the data.json that your laptop pushes
            const res = await fetch('data.json?nocache=' + Date.now());
            const data = await res.json();
            const flow = document.getElementById('chat-flow');
            
            // Clear and rebuild the "Messages"
            flow.innerHTML = "";
            data.updates.forEach(item => {
                const div = document.createElement('div');
                div.className = "msg ai-node";
                div.innerHTML = `<div class="label">${item.domain} • ${item.time}</div>${item.content}`;
                flow.appendChild(div);
            });
        } catch (e) {
            console.log("Syncing with GitHub...");
        }
    }

    // Refresh every 30 seconds
    setInterval(updateStream, 30000);
    updateStream();
</script>
</body>
</html>
