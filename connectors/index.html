<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Intelligence Stream</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #ffffff; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { padding: 15px; border-bottom: 1px solid #d1d1d6; text-align: center; background: #f7f7f7; font-weight: 600; }
        #chat-flow { flex: 1; overflow-y: scroll; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 75%; padding: 12px; border-radius: 18px; font-size: 15px; background: #e9e9eb; color: #000; align-self: flex-start; border-bottom-left-radius: 4px; }
        .label { font-size: 10px; font-weight: bold; color: #8e8e93; text-transform: uppercase; margin-bottom: 2px; }
    </style>
</head>
<body>
    <div class="header">Intelligence Node</div>
    <div id="chat-flow"><div class="msg">Establishing Link...</div></div>
    <script>
        async function update() {
            try {
                const r = await fetch('data.json?nocache=' + Date.now());
                const d = await r.json();
                if (d.updates && d.updates.length > 0) {
                    document.getElementById('chat-flow').innerHTML = d.updates.map(i => `
                        <div class="msg"><div class="label">${i.domain} • ${i.time}</div>${i.content}</div>
                    `).join('');
                }
            } catch (e) { console.log("Waiting for data..."); }
        }
        setInterval(update, 10000);
        update();
    </script>
</body>
</html>
